name: Build packages

on:
  push:
    paths:
      - "specs/**"
      - "graph.yml"
  pull_request:
    paths:
      - "specs/**"
      - "graph.yml"

jobs:
  rpm:
    runs-on: ubuntu-latest

    container:
      image: fedora:44

    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tools
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            dnf-plugins-core \
            spectool \
            yq \
            createrepo_c

      - name: Setup rpmbuild tree
        run: |
          rpmdev-setuptree

      - name: Build dependencies
        run: |
          set -e
          graph=graph.yml

          deps=$(yq -r '.dependencies[]' "$graph")

          mkdir ~/dependencies

          for package in $deps; do
            cp "specs/$package.spec" ~/rpmbuild/SPECS/
            spec=~/rpmbuild/SPECS/$package.spec
            package_name=$(rpmspec -q --qf "%{NVRA}\n" "$spec")

            spectool -g -R $spec
            dnf builddep -y $spec
            rpmbuild -ba $spec

            mv "$HOME/rpmbuild/RPMS/x86_64/"* ~/dependencies/
          done

          createrepo_c ~/dependencies/
          dnf config-manager --add-repo "file://$HOME/dependencies"
          dnf makecache
      - name: Build packages
        run: |
          set -e
          graph=graph.yml

          packages=$(yq -r '.packages[]' "$graph")

          for package in $packages; do
            cp "specs/$package.spec" ~/rpmbuild/SPECS/
            spec=~/rpmbuild/SPECS/$package.spec
            spectool -g -R $spec
            dnf builddep -y $spec
            rpmbuild -ba $spec
          done

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: |
            ~/rpmbuild/RPMS/**/*.rpm
